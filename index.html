<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0a0612" />
<title>Maverick</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0612;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
    touch-action: none;
  }
  #wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    background: #0a0612;
    box-shadow: 0 0 60px rgba(255, 0, 149, 0.25), 0 0 120px rgba(0, 212, 255, 0.15);
    touch-action: none;
  }
  #rotate-prompt {
    display: none;
    position: fixed;
    inset: 0;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0612;
    color: #fff;
    text-align: center;
    padding: 24px;
  }
  #rotate-prompt .phone {
    width: 56px;
    height: 100px;
    border: 4px solid #ff0095;
    border-radius: 10px;
    position: relative;
    margin-bottom: 28px;
    box-shadow: 0 0 22px rgba(255, 0, 149, 0.6);
    animation: rotate-phone 2.4s cubic-bezier(.7,0,.3,1) infinite;
  }
  #rotate-prompt .phone::before {
    content: '';
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 22px;
    height: 4px;
    background: #ff0095;
    border-radius: 2px;
    box-shadow: 0 0 8px #ff5cb8;
  }
  #rotate-prompt h1 {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 3px;
    color: #ff0095;
    text-shadow: 0 0 14px #ff5cb8;
    margin: 0 0 8px;
  }
  #rotate-prompt p {
    font-size: 13px;
    letter-spacing: 1.5px;
    color: #00d4ff;
    text-shadow: 0 0 10px #7df0ff;
    margin: 0;
  }
  @keyframes rotate-phone {
    0%, 30%   { transform: rotate(0deg); }
    50%, 80%  { transform: rotate(-90deg); }
    100%      { transform: rotate(-90deg); }
  }
  @media (orientation: portrait) {
    #wrap { display: none; }
    #rotate-prompt { display: flex; }
  }
  #debug {
    display: none;
    position: fixed;
    top: 8px;
    right: 8px;
    width: 240px;
    background: rgba(10, 6, 18, 0.92);
    border: 1px solid #ff0095;
    border-radius: 6px;
    padding: 10px;
    color: #fff;
    font: 11px/1.35 ui-monospace, Menlo, Consolas, monospace;
    z-index: 50;
    box-shadow: 0 0 14px rgba(255, 0, 149, 0.35);
  }
  #debug.show { display: block; }
  #debug h3 { font-size: 11px; letter-spacing: 1px; color: #ff5cb8; margin: 0 0 6px; }
  #debug .row { display: flex; justify-content: space-between; gap: 8px; }
  #debug .row span:last-child { color: #7df0ff; }
  #debug hr { border: none; border-top: 1px solid #2a1640; margin: 8px 0; }
  #debug label { display: grid; grid-template-columns: 70px 1fr 36px; align-items: center; gap: 6px; }
  #debug label > span { color: #ccc; }
  #debug input[type=range] { width: 100%; accent-color: #ff0095; }
  #debug .flash {
    height: 12px;
    background: #2a1640;
    border-radius: 3px;
    margin: 6px 0;
    overflow: hidden;
    position: relative;
  }
  #debug .flash::after {
    content: '';
    position: absolute;
    inset: 0;
    background: #ff0095;
    box-shadow: 0 0 12px #ff5cb8;
    opacity: 0;
  }
  #debug .flash.hit::after { animation: beat-flash 220ms ease-out; }
  @keyframes beat-flash {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }
  #debug { position: relative; }
  #debug button#d-reset {
    margin-top: 6px;
    width: 100%;
    background: transparent;
    color: #ff0095;
    border: 1px solid #ff0095;
    border-radius: 4px;
    padding: 6px;
    font: inherit;
    letter-spacing: 1px;
    cursor: pointer;
  }
  #debug button#d-reset:active { background: rgba(255, 0, 149, 0.2); }
  #debug .close {
    position: absolute;
    top: 4px;
    right: 6px;
    width: 22px;
    height: 22px;
    background: transparent;
    border: none;
    color: #ff5cb8;
    font: 700 18px/1 ui-monospace, Menlo, Consolas, monospace;
    cursor: pointer;
    padding: 0;
    margin: 0;
  }
  #help-toggle {
    position: fixed;
    bottom: 14px;
    right: 14px;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: rgba(10, 6, 18, 0.55);
    border: 1.5px solid #ff0095;
    color: #ff5cb8;
    font: 700 16px/1 ui-monospace, Menlo, Consolas, monospace;
    cursor: pointer;
    z-index: 60;
    box-shadow: 0 0 10px rgba(255, 0, 149, 0.35);
    text-shadow: 0 0 6px #ff5cb8;
    -webkit-tap-highlight-color: transparent;
  }
  #help-toggle[hidden] { display: none; }
  #help-toggle:active { background: rgba(255, 0, 149, 0.2); }
  @media (orientation: portrait) {
    #help-toggle { display: none !important; }
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>
<div id="rotate-prompt">
  <div class="phone"></div>
  <h1>ROTATE YOUR DEVICE</h1>
  <p>MAVERICK IS A LANDSCAPE GAME</p>
</div>
<div id="debug">
  <h3>BEAT DEBUG</h3>
  <div class="row"><span>status</span><span id="d-status">—</span></div>
  <div class="row"><span>BPM</span><span id="d-bpm">—</span></div>
  <div class="row"><span>flux</span><span id="d-energy">—</span></div>
  <div class="row"><span>avg</span><span id="d-avg">—</span></div>
  <div class="row"><span>ratio</span><span id="d-ratio">—</span></div>
  <div class="row"><span>beats D/S</span><span id="d-beats">0 / 0</span></div>
  <div class="flash" id="d-flash"></div>
  <hr>
  <label><span>thresh</span><input id="d-thresh" type="range" min="1.1" max="6" step="0.05"><span id="d-thresh-v">3</span></label>
  <label><span>floor</span><input id="d-floor" type="range" min="0" max="60" step="0.5"><span id="d-floor-v">20</span></label>
  <label><span>bin start</span><input id="d-binstart" type="range" min="0" max="40" step="1"><span id="d-binstart-v">0</span></label>
  <label><span>bin end</span><input id="d-binend" type="range" min="2" max="60" step="1"><span id="d-binend-v">5</span></label>
  <label><span>refract</span><input id="d-refract" type="range" min="60" max="400" step="10"><span id="d-refract-v">200</span></label>
  <button id="d-reset" type="button">RESET DETECTION</button>
  <button id="d-close" class="close" type="button" aria-label="Close">×</button>
</div>
<button id="help-toggle" type="button" aria-label="Beat debug">?</button>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // World height is fixed at 360; world width scales with device aspect
  // ratio so the game fills the screen instead of letterboxing the sides.
  let W = 640;
  const H = 360;
  const W_MIN = 480, W_MAX = 960;

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const cw = window.innerWidth;
    const ch = window.innerHeight;
    W = Math.max(W_MIN, Math.min(W_MAX, Math.round(H * cw / ch)));
    canvas.style.width = cw + 'px';
    canvas.style.height = ch + 'px';
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    layoutButtons();
  }
  let _buttonsReady = false;
  function layoutButtons() {
    if (!_buttonsReady) return;
    // 3 menu buttons centered with 30px gaps
    const bw = 160, gap = 30;
    const total = 3 * bw + 2 * gap;
    const startX = (W - total) / 2;
    menuButtons[0].x = startX;
    menuButtons[1].x = startX + bw + gap;
    menuButtons[2].x = startX + 2 * (bw + gap);
    overButtons[0].x = W / 2 - 130;
    overButtons[1].x = W / 2 + 20;
  }
  window.addEventListener('resize', resize);
  resize();

  const STATE_READY = 0, STATE_PLAY = 1, STATE_OVER = 2;
  let state = STATE_READY;

  const MODE_GATES = 'gates';
  const MODE_RINGS = 'rings';
  const MODE_TUNNEL = 'tunnel';
  let mode = MODE_GATES;
  const RING_RX = 22;       // horizontal radius — narrow (ring tilted around vertical axis)
  const RING_RY = 38;       // vertical radius — full
  const RING_INTERVAL = 1.0;
  const TUNNEL_GAP = 170;
  const TUNNEL_SAMPLE_SPACING = 36;
  const TUNNEL_WALK = 60;
  let rings = [];
  let tunnelSamples = [];
  let scrollDistance = 0; // for tunnel-mode scoring

  // Tuning — Maverick Bird-style, landscape
  const GRAVITY = 750;
  const FLAP_VEL = -290;
  const SCROLL_SPEED_MIN = 360;
  const SCROLL_SPEED_MAX = 620;
  const SCROLL_SPEED_RAMP = 10;   // px/s² — reaches max in ~26s
  let scrollSpeed = SCROLL_SPEED_MIN;
  const WALL_INTERVAL = 1.3;
  const WALL_THICK = 26;
  const GAP_SIZE = 105;
  const PLAYER_X = 150;
  const PLAYER_SIZE = 13;
  const TRAIL_MAX = 32;

  const COL_BG = '#0a0612';
  const COL_PLAYER = '#ff0095';
  const COL_PLAYER_GLOW = '#ff5cb8';
  const COL_WALL = '#00d4ff';
  const COL_WALL_GLOW = '#7df0ff';
  const COL_LINE = '#2a1640';
  const COL_HUD = '#ffffff';

  let player, walls, score, spawnTimer, time, scrollOffset;
  let trail;
  let shake;
  let flashAlpha;
  let overTimer;

  // ---- audio + beat sync ------------------------------------------------
  // Drop a song.mp3 next to index.html and the game world locks to its
  // beat. With no file, falls back to a steady 120 BPM pulse.
  const AUDIO_FILE = './song.mp3';
  let audioCtx = null;
  let audioSource = null;
  let analyser = null;
  let audioStatus = 'idle'; // idle | loading | playing | failed | fallback
  const bassHist = [];
  const _freqBuf = new Uint8Array(256);
  const _prevSpectrum = new Uint8Array(256);
  let _prevSpectrumValid = false;
  let lastBeatT = -1;
  let lastDetectedT = -1;
  let beatPulse = 0;     // 0..1, decays each frame
  let beatCount = 0;
  let detectedCount = 0;
  let safetyCount = 0;
  let beatBPMavg = 0.5;  // average inter-beat interval (s) from detected beats only

  // Mutable detection params (driven by debug panel)
  // Spectral flux: ratio of current flux spike to rolling avg flux
  let beatThresh = 3;
  let beatFloor = 20;
  let beatBinStart = 0;
  let beatBinEnd = 5;
  let beatRefract = 0.2;
  let lastEnergy = 0, lastAvg = 0;

  async function startAudio() {
    if (audioStatus !== 'idle') return;
    audioStatus = 'loading';
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      audioCtx = new Ctx();
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      const res = await fetch(AUDIO_FILE);
      if (!res.ok) throw new Error('no song');
      const arr = await res.arrayBuffer();
      const buf = await audioCtx.decodeAudioData(arr);
      audioSource = audioCtx.createBufferSource();
      audioSource.buffer = buf;
      audioSource.loop = true;
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 512;
      analyser.smoothingTimeConstant = 0.2;
      audioSource.connect(analyser);
      analyser.connect(audioCtx.destination);
      audioSource.start();
      audioStatus = 'playing';
    } catch (e) {
      audioStatus = 'fallback';
    }
  }

  function tickBeat(now, dt) {
    beatPulse = Math.max(0, beatPulse - dt * 5);
    let detected = false;
    if (analyser) {
      analyser.getByteFrequencyData(_freqBuf);
      const start = Math.max(0, beatBinStart);
      const end = Math.max(start + 1, beatBinEnd);

      // Spectral flux within band: sum of positive bin-to-bin deltas vs
      // the previous frame, normalized by band width. Sustained bass
      // produces near-zero flux; sharp attacks (kicks) produce spikes.
      let flux = 0;
      if (_prevSpectrumValid) {
        for (let i = start; i < end; i++) {
          const d = _freqBuf[i] - _prevSpectrum[i];
          if (d > 0) flux += d;
        }
        flux /= (end - start);
      }
      _prevSpectrum.set(_freqBuf);
      _prevSpectrumValid = true;

      bassHist.push(flux);
      if (bassHist.length > 30) bassHist.shift();
      let avg = 0;
      for (const v of bassHist) avg += v;
      avg /= bassHist.length;
      lastEnergy = flux;
      lastAvg = avg;
      if (bassHist.length > 12 && flux > avg * beatThresh && flux > beatFloor && now - lastBeatT > beatRefract) {
        triggerBeat(now, true);
        detected = true;
      }
    }
    // safety pulse — ONLY when we're not analysing live audio. When a
    // song is playing, the world should pulse only on real detections;
    // gaps without transients should mean stillness.
    if (!detected && !analyser && now - lastBeatT > 0.5) {
      triggerBeat(now, false);
    }
  }

  function triggerBeat(now, isDetected) {
    if (isDetected && lastDetectedT > 0) {
      const dt = now - lastDetectedT;
      if (dt > 0.2 && dt < 1.5) beatBPMavg = beatBPMavg * 0.85 + dt * 0.15;
    }
    beatPulse = 1;
    beatCount++;
    lastBeatT = now;
    if (isDetected) {
      lastDetectedT = now;
      detectedCount++;
    } else {
      safetyCount++;
    }
  }

  function beatEase() {
    // sharp attack, smooth decay
    const v = beatPulse * beatPulse;
    // subdue effects on the menu and before the song actually syncs
    const subdued = state === STATE_READY || audioStatus !== 'playing';
    return subdued ? v * 0.3 : v;
  }

  // Per-mode best scores stored as a JSON object
  let bestScores = {};
  try { bestScores = JSON.parse(localStorage.getItem('maverick_bests') || '{}') || {}; } catch (e) {}
  function getBest() { return bestScores[mode] || 0; }
  function maybeUpdateBest() {
    if (score > (bestScores[mode] || 0)) {
      bestScores[mode] = score;
      try { localStorage.setItem('maverick_bests', JSON.stringify(bestScores)); } catch (e) {}
    }
  }

  function reset(newMode) {
    if (newMode !== undefined) mode = newMode;
    player = { x: PLAYER_X, y: H * 0.5, vy: 0, rot: 0, flapTimer: 0 };
    walls = [];
    rings = [];
    tunnelSamples = [];
    scrollDistance = 0;
    scrollSpeed = SCROLL_SPEED_MIN;
    score = 0;
    spawnTimer = 0;
    time = 0;
    scrollOffset = 0;
    trail = [];
    shake = 0;
    flashAlpha = 0;
    overTimer = 0;
    state = STATE_READY;
    lastBeatT = -1;
    lastDetectedT = -1;
    beatPulse = 0;
    if (mode === MODE_TUNNEL) initTunnel();
  }

  function initTunnel() {
    tunnelSamples.length = 0;
    // Plant the first stretch dead-centre so the player never spawns
    // inside a wall. The walk only starts once we're past PLAYER_X.
    const safeUntilX = PLAYER_X + 80;
    let mid = H * 0.5;
    for (let x = 0; x <= W + TUNNEL_SAMPLE_SPACING * 4; x += TUNNEL_SAMPLE_SPACING) {
      tunnelSamples.push({ x, midY: mid });
      if (x >= safeUntilX) {
        mid = clampMid(mid + (Math.random() - 0.5) * TUNNEL_WALK * 0.7);
      }
    }
  }

  function clampMid(v) {
    const margin = 30;
    return Math.max(TUNNEL_GAP / 2 + margin, Math.min(H - TUNNEL_GAP / 2 - margin, v));
  }
  reset();

  function spawnWall() {
    const margin = 30;
    const minTop = margin;
    const maxTop = H - GAP_SIZE - margin;
    const top = Math.random() * (maxTop - minTop) + minTop;
    walls.push({ x: W + 10, top, passed: false });
  }

  function updateGates(dt) {
    spawnTimer += dt;
    if (spawnTimer >= WALL_INTERVAL) {
      spawnTimer = 0;
      spawnWall();
    }
    for (const w of walls) w.x -= scrollSpeed * dt;
    while (walls.length && walls[0].x + WALL_THICK < -10) walls.shift();
    for (const w of walls) {
      if (!w.passed && w.x + WALL_THICK < player.x - PLAYER_SIZE) {
        w.passed = true;
        score++;
      }
      const inX = player.x + PLAYER_SIZE > w.x && player.x - PLAYER_SIZE < w.x + WALL_THICK;
      if (inX) {
        if (player.y - PLAYER_SIZE < w.top || player.y + PLAYER_SIZE > w.top + GAP_SIZE) {
          die();
        }
      }
    }
  }

  function spawnRing() {
    const margin = 60;
    const y = margin + Math.random() * (H - margin * 2);
    rings.push({ x: W + 30, y, passed: false, through: false, scored: false, flashT: 0 });
  }

  function updateRings(dt) {
    spawnTimer += dt;
    if (spawnTimer >= RING_INTERVAL) {
      spawnTimer = 0;
      spawnRing();
    }
    for (const r of rings) {
      r.x -= scrollSpeed * dt;
      if (r.flashT > 0) r.flashT = Math.max(0, r.flashT - dt);
    }
    while (rings.length && rings[0].x < -RING_RX * 2) rings.shift();
    for (const r of rings) {
      if (r.passed) continue;
      // Swept check: if at any frame during the ring's traversal of the
      // player's x range the bird's centre is inside the ellipse, mark
      // the ring as "through". Then commit the score when the ring fully
      // exits behind the player.
      const dx = player.x - r.x;
      if (Math.abs(dx) < RING_RX) {
        const dy = r.y - player.y;
        const norm = (dx * dx) / (RING_RX * RING_RX) + (dy * dy) / (RING_RY * RING_RY);
        if (norm < 1) r.through = true;
      }
      if (r.x + RING_RX < player.x) {
        r.passed = true;
        if (r.through) {
          score++;
          r.scored = true;
        }
        r.flashT = 0.45;
      }
    }
  }

  function updateTunnel(dt) {
    if (tunnelSamples.length === 0) initTunnel();
    for (const s of tunnelSamples) s.x -= scrollSpeed * dt;
    while (tunnelSamples.length > 1 && tunnelSamples[0].x < -TUNNEL_SAMPLE_SPACING * 2) {
      tunnelSamples.shift();
    }
    let last = tunnelSamples[tunnelSamples.length - 1];
    while (last.x < W + TUNNEL_SAMPLE_SPACING * 4) {
      const newX = last.x + TUNNEL_SAMPLE_SPACING;
      const newMid = clampMid(last.midY + (Math.random() - 0.5) * TUNNEL_WALK);
      tunnelSamples.push({ x: newX, midY: newMid });
      last = tunnelSamples[tunnelSamples.length - 1];
    }
    // collision: lerp midY at player.x
    const mid = tunnelMidAtX(player.x);
    if (Math.abs(player.y - mid) > TUNNEL_GAP / 2 - PLAYER_SIZE * 0.6) {
      die();
    }
    // scoring: 1 point per 220 px advanced
    scrollDistance += scrollSpeed * dt;
    while (scrollDistance >= 220) {
      scrollDistance -= 220;
      score++;
    }
  }

  function tunnelMidAtX(x) {
    for (let i = 0; i < tunnelSamples.length - 1; i++) {
      const a = tunnelSamples[i], b = tunnelSamples[i + 1];
      if (a.x <= x && b.x > x) {
        const t = (x - a.x) / (b.x - a.x);
        return a.midY + (b.midY - a.midY) * t;
      }
    }
    return H * 0.5;
  }

  function flap() {
    player.vy = FLAP_VEL;
    player.flapTimer = 0.15;
  }

  function startGame(m) {
    reset(m);
    state = STATE_PLAY;
    startAudio();
  }

  function canvasCoords(e) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left) * W / rect.width,
      y: (e.clientY - rect.top) * H / rect.height,
    };
  }

  function onTap(e) {
    if (e.cancelable) e.preventDefault();
    const { x, y } = canvasCoords(e);
    if (state === STATE_READY) {
      for (const b of menuButtons) {
        if (hitButton(b, x, y)) { startGame(b.mode); return; }
      }
      return;
    }
    if (state === STATE_PLAY) { flap(); return; }
    if (state === STATE_OVER && overTimer > 0.4) {
      for (const b of overButtons) {
        if (hitButton(b, x, y)) {
          if (b.action === 'retry') startGame(mode);
          else if (b.action === 'menu') reset(mode);
          return;
        }
      }
    }
  }
  canvas.addEventListener('pointerdown', onTap, { passive: false });
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
      e.preventDefault();
      if (state === STATE_READY) startGame(mode);
      else if (state === STATE_PLAY) flap();
      else if (state === STATE_OVER && overTimer > 0.4) startGame(mode);
    }
  });
  document.addEventListener('gesturestart', (e) => e.preventDefault());
  document.addEventListener('dblclick', (e) => e.preventDefault());

  // Draw helpers ----------------------------------------------------------
  function drawBackground() {
    const bp = beatEase();

    ctx.fillStyle = COL_BG;
    ctx.fillRect(0, 0, W, H);

    // perspective grid — alpha pulses subtly on beat, color stays muted
    ctx.strokeStyle = COL_LINE;
    ctx.lineWidth = 1;
    const horizonY = H / 2;
    const linesAhead = 14;
    for (let i = 0; i < linesAhead; i++) {
      const t = ((i / linesAhead) + (scrollOffset * 0.0006) % (1 / linesAhead)) % 1;
      const eased = t * t;
      const yTop = horizonY - eased * horizonY;
      const yBot = horizonY + eased * (H - horizonY);
      ctx.globalAlpha = (0.25 + eased * 0.5) * (1 + bp * 0.35);
      ctx.beginPath();
      ctx.moveTo(0, yTop);
      ctx.lineTo(W, yTop);
      ctx.moveTo(0, yBot);
      ctx.lineTo(W, yBot);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // vertical scrolling rails — same muted pulse
    ctx.strokeStyle = COL_LINE;
    const railSpacing = 60;
    const off = scrollOffset % railSpacing;
    for (let x = -off; x < W; x += railSpacing) {
      ctx.globalAlpha = 0.35 * (1 + bp * 0.4);
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function drawSpikeRow(x, y, width, height, dir) {
    // dir = +1 spikes pointing down (mounted on top wall)
    //       -1 spikes pointing up (mounted on bottom wall)
    const tooth = 10;
    const count = Math.max(2, Math.floor(width / tooth));
    const w = width / count;
    ctx.beginPath();
    for (let i = 0; i < count; i++) {
      const sx = x + i * w;
      ctx.moveTo(sx, y);
      ctx.lineTo(sx + w, y);
      ctx.lineTo(sx + w / 2, y + height * dir);
      ctx.closePath();
    }
    ctx.fill();
  }

  function drawWall(p) {
    const bp = beatEase();
    const gapBottom = p.top + GAP_SIZE;
    const topH = p.top;
    const botY = gapBottom;
    const botH = H - gapBottom;

    // glow
    ctx.shadowColor = COL_WALL_GLOW;
    ctx.shadowBlur = 14 + bp * 18;

    // bars
    ctx.fillStyle = COL_WALL;
    ctx.fillRect(p.x, 0, WALL_THICK, topH);
    ctx.fillRect(p.x, botY, WALL_THICK, botH);

    // bright edge
    ctx.shadowBlur = 0;
    ctx.fillStyle = COL_WALL_GLOW;
    const edgeW = 3 + bp * 4;
    ctx.fillRect(p.x + WALL_THICK - edgeW, 0, edgeW, topH);
    ctx.fillRect(p.x + WALL_THICK - edgeW, botY, edgeW, botH);

    // spike tips at gap edges
    ctx.shadowColor = COL_WALL_GLOW;
    ctx.shadowBlur = 12 + bp * 14;
    ctx.fillStyle = COL_WALL;
    drawSpikeRow(p.x, p.top, WALL_THICK, 14, +1);
    drawSpikeRow(p.x, gapBottom, WALL_THICK, 14, -1);
    ctx.shadowBlur = 0;
  }

  function drawTrail() {
    for (let i = 0; i < trail.length; i++) {
      const t = trail[i];
      const k = i / trail.length;
      ctx.globalAlpha = k * 0.5;
      ctx.fillStyle = COL_PLAYER_GLOW;
      ctx.beginPath();
      ctx.arc(t.x, t.y, PLAYER_SIZE * (0.3 + 0.7 * k), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawPlayer() {
    const bp = beatEase();
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.rot);
    const scale = 1 + bp * 0.18;
    ctx.scale(scale, scale);

    // glow
    ctx.shadowColor = COL_PLAYER_GLOW;
    ctx.shadowBlur = 22 + bp * 18;

    // triangular ship pointing right
    const s = PLAYER_SIZE;
    ctx.fillStyle = COL_PLAYER;
    ctx.beginPath();
    ctx.moveTo(s * 1.2, 0);
    ctx.lineTo(-s * 0.9, -s);
    ctx.lineTo(-s * 0.4, 0);
    ctx.lineTo(-s * 0.9, s);
    ctx.closePath();
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.restore();
  }

  function drawBoundaries() {
    const bp = beatEase();
    ctx.shadowColor = COL_PLAYER_GLOW;
    ctx.shadowBlur = 12 + bp * 18;
    ctx.fillStyle = COL_PLAYER;
    const t = 3 + bp * 4;
    ctx.fillRect(0, 0, W, t);
    ctx.fillRect(0, H - t, W, t);
    ctx.shadowBlur = 0;
  }

  function drawTextCentered(text, y, size, color, glow) {
    ctx.font = `900 ${size}px "Helvetica Neue", Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (glow) {
      ctx.shadowColor = glow;
      ctx.shadowBlur = 18;
    }
    ctx.fillStyle = color;
    ctx.fillText(text, W / 2, y);
    ctx.shadowBlur = 0;
  }

  // Buttons ---------------------------------------------------------------
  const menuButtons = [
    { x: 50,  y: 150, w: 160, h: 70, label: 'GATES',  mode: MODE_GATES,
      sub: 'die on miss' },
    { x: 240, y: 150, w: 160, h: 70, label: 'RINGS',  mode: MODE_RINGS,
      sub: 'no fail' },
    { x: 430, y: 150, w: 160, h: 70, label: 'TUNNEL', mode: MODE_TUNNEL,
      sub: 'snake corridor' },
  ];
  const overButtons = [
    { x: 195, y: 240, w: 110, h: 44, label: 'RETRY', action: 'retry' },
    { x: 335, y: 240, w: 110, h: 44, label: 'MENU',  action: 'menu' },
  ];
  _buttonsReady = true;
  layoutButtons();

  function hitButton(b, x, y) {
    return x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h;
  }

  function drawButton(b) {
    const bp = beatEase();
    ctx.save();
    ctx.fillStyle = 'rgba(10, 6, 18, 0.55)';
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.strokeStyle = COL_PLAYER;
    ctx.shadowColor = COL_PLAYER_GLOW;
    ctx.shadowBlur = 10 + bp * 14;
    ctx.lineWidth = 2;
    ctx.strokeRect(b.x, b.y, b.w, b.h);
    ctx.shadowBlur = 0;
    ctx.fillStyle = COL_PLAYER;
    ctx.font = '900 18px "Helvetica Neue", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = COL_PLAYER_GLOW;
    ctx.shadowBlur = 8;
    const labelY = b.sub ? b.y + b.h * 0.42 : b.y + b.h * 0.5;
    ctx.fillText(b.label, b.x + b.w / 2, labelY);
    ctx.shadowBlur = 0;
    if (b.sub) {
      ctx.font = '500 10px "Helvetica Neue", Arial, sans-serif';
      ctx.fillStyle = 'rgba(125, 240, 255, 0.75)';
      ctx.fillText(b.sub, b.x + b.w / 2, b.y + b.h * 0.72);
    }
    ctx.restore();
  }

  function ringColors(r) {
    if (r.passed && r.flashT > 0) {
      if (r.scored) return { color: '#5fff8a', glow: '#00ff66' };
      return { color: '#ff4d5a', glow: '#ff0033' };
    }
    return { color: COL_WALL, glow: COL_WALL_GLOW };
  }

  // The ring is a vertical ellipse (rx<ry), tilted around its vertical
  // axis like a Sonic ring. Render the LEFT half before the bird and
  // the RIGHT half after, so as the ring scrolls past PLAYER_X the bird
  // appears to thread through the middle.
  function drawRingHalf(r, kind) {
    const bp = beatEase();
    const { color, glow } = ringColors(r);
    const a = r.passed && r.flashT > 0 ? 0.4 + 0.6 * (r.flashT / 0.45) : 1;
    ctx.globalAlpha = a;
    // canvas angles: 0=right, π/2=bottom, π=left, 3π/2=top
    const start = kind === 'back' ? Math.PI / 2 : -Math.PI / 2;
    const end   = kind === 'back' ? 3 * Math.PI / 2 : Math.PI / 2;
    ctx.strokeStyle = color;
    ctx.shadowColor = glow;
    ctx.shadowBlur = 14 + bp * 18;
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.ellipse(r.x, r.y, RING_RX, RING_RY, 0, start, end);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = glow;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(r.x, r.y, RING_RX - 4, RING_RY - 4, 0, start, end);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  function drawRingsBack()  { for (const r of rings) drawRingHalf(r, 'back'); }
  function drawRingsFront() { for (const r of rings) drawRingHalf(r, 'front'); }

  function drawTunnel() {
    if (tunnelSamples.length < 2) return;
    const bp = beatEase();
    ctx.fillStyle = COL_WALL;
    ctx.shadowColor = COL_WALL_GLOW;
    ctx.shadowBlur = 14 + bp * 18;

    // top wall polygon
    ctx.beginPath();
    ctx.moveTo(tunnelSamples[0].x, 0);
    for (const s of tunnelSamples) ctx.lineTo(s.x, s.midY - TUNNEL_GAP / 2);
    ctx.lineTo(tunnelSamples[tunnelSamples.length - 1].x, 0);
    ctx.closePath();
    ctx.fill();

    // bottom wall polygon
    ctx.beginPath();
    ctx.moveTo(tunnelSamples[0].x, H);
    for (const s of tunnelSamples) ctx.lineTo(s.x, s.midY + TUNNEL_GAP / 2);
    ctx.lineTo(tunnelSamples[tunnelSamples.length - 1].x, H);
    ctx.closePath();
    ctx.fill();

    ctx.shadowBlur = 0;
    // bright inner edge
    ctx.strokeStyle = COL_WALL_GLOW;
    ctx.lineWidth = 2 + bp * 2;
    ctx.beginPath();
    ctx.moveTo(tunnelSamples[0].x, tunnelSamples[0].midY - TUNNEL_GAP / 2);
    for (const s of tunnelSamples) ctx.lineTo(s.x, s.midY - TUNNEL_GAP / 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(tunnelSamples[0].x, tunnelSamples[0].midY + TUNNEL_GAP / 2);
    for (const s of tunnelSamples) ctx.lineTo(s.x, s.midY + TUNNEL_GAP / 2);
    ctx.stroke();
  }

  // Loop ------------------------------------------------------------------
  let lastT = performance.now();
  function loop(now) {
    const dt = Math.min(0.033, (now - lastT) / 1000);
    lastT = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  function update(dt) {
    time += dt;
    if (shake > 0) shake = Math.max(0, shake - dt * 3);
    tickBeat(time, dt);

    if (state === STATE_READY) {
      // park the bird in the lower-center gap between buttons and hint
      player.x = W * 0.5;
      player.y = H - 60 + Math.sin(time * 5) * 6;
      player.rot = Math.sin(time * 3) * 0.15;
      scrollOffset += scrollSpeed * 0.4 * dt;
      pushTrail(scrollSpeed * 0.4 * dt);
      return;
    }

    if (state === STATE_PLAY) {
      // ramp scroll speed from min toward max over time
      scrollSpeed = Math.min(SCROLL_SPEED_MAX, scrollSpeed + SCROLL_SPEED_RAMP * dt);

      player.vy += GRAVITY * dt;
      player.y += player.vy * dt;
      player.flapTimer = Math.max(0, player.flapTimer - dt);

      const targetRot = Math.max(-0.7, Math.min(1.1, player.vy / 700));
      player.rot += (targetRot - player.rot) * Math.min(1, dt * 10);

      if (mode === MODE_GATES) updateGates(dt);
      else if (mode === MODE_RINGS) updateRings(dt);
      else if (mode === MODE_TUNNEL) updateTunnel(dt);

      // ceiling / floor are lethal in every mode
      if (player.y - PLAYER_SIZE < 4 || player.y + PLAYER_SIZE > H - 4) {
        player.y = Math.max(PLAYER_SIZE + 4, Math.min(H - PLAYER_SIZE - 4, player.y));
        die();
      }

      scrollOffset += scrollSpeed * dt;
      pushTrail(scrollSpeed * dt);
    }

    if (state === STATE_OVER) {
      overTimer += dt;
      flashAlpha = Math.max(0, flashAlpha - dt * 2);
    }
  }

  function pushTrail(scrollDx) {
    // existing points drift left at the scroll speed so the trail
    // appears to come out of the bird's tail rather than stacking up
    for (const t of trail) t.x -= scrollDx;
    trail.push({ x: player.x - PLAYER_SIZE * 0.6, y: player.y });
    if (trail.length > TRAIL_MAX) trail.shift();
  }

  function die() {
    if (state !== STATE_PLAY) return;
    state = STATE_OVER;
    overTimer = 0;
    flashAlpha = 1;
    shake = 1;
    maybeUpdateBest();
  }

  function render() {
    ctx.save();
    const bp = beatEase();

    // camera zoom punch on beat
    if (bp > 0) {
      const z = 1 + bp * 0.025;
      ctx.translate(W * 0.5, H * 0.5);
      ctx.scale(z, z);
      ctx.translate(-W * 0.5, -H * 0.5);
    }

    if (shake > 0) {
      const mag = shake * 10;
      ctx.translate((Math.random() - 0.5) * mag, (Math.random() - 0.5) * mag);
    }

    drawBackground();
    if (mode === MODE_GATES) {
      for (const w of walls) drawWall(w);
    } else if (mode === MODE_TUNNEL) {
      drawTunnel();
    } else if (mode === MODE_RINGS) {
      drawRingsBack();
    }
    drawBoundaries();
    drawTrail();
    drawPlayer();
    if (mode === MODE_RINGS) drawRingsFront();

    if (state === STATE_PLAY) {
      const sz = 36 + bp * 16;
      drawTextCentered(String(score), 38, sz, COL_HUD, COL_PLAYER_GLOW);
      // small BEST badge in top-right
      ctx.font = '600 12px ui-monospace, Menlo, Consolas, monospace';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'top';
      ctx.fillStyle = 'rgba(125, 240, 255, 0.85)';
      ctx.shadowColor = COL_WALL_GLOW;
      ctx.shadowBlur = 6;
      ctx.fillText('BEST  ' + getBest(), W - 14, 14);
      ctx.shadowBlur = 0;
    }

    if (state === STATE_READY) {
      drawTextCentered('MAVERICK', 70, 40 + bp * 6, COL_PLAYER, COL_PLAYER_GLOW);
      for (const b of menuButtons) drawButton(b);
      // per-mode best score under each button
      ctx.font = '700 11px ui-monospace, Menlo, Consolas, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      for (const b of menuButtons) {
        const bv = bestScores[b.mode] || 0;
        ctx.fillStyle = bv > 0 ? 'rgba(125, 240, 255, 0.9)' : 'rgba(125, 240, 255, 0.35)';
        ctx.shadowColor = COL_WALL_GLOW;
        ctx.shadowBlur = bv > 0 ? 6 : 0;
        ctx.fillText('BEST  ' + bv, b.x + b.w / 2, b.y + b.h + 8);
      }
      ctx.shadowBlur = 0;

      // tiny audio status hint
      const hint = audioStatus === 'playing' ? '♪ SYNCED'
                 : audioStatus === 'loading' ? '♪ LOADING'
                 : audioStatus === 'fallback' ? 'NO AUDIO — 120 BPM'
                 : '♪ AUDIO ON TAP';
      ctx.globalAlpha = 0.6;
      drawTextCentered(hint, H - 18, 10, COL_WALL_GLOW, null);
      ctx.globalAlpha = 1;
    }

    if (state === STATE_OVER) {
      if (flashAlpha > 0) {
        ctx.fillStyle = `rgba(255, 0, 149, ${flashAlpha * 0.6})`;
        ctx.fillRect(0, 0, W, H);
      }
      drawTextCentered('CRASHED', 60, 28, COL_PLAYER, COL_PLAYER_GLOW);
      drawTextCentered(String(score), 130, 44, COL_HUD, COL_WALL_GLOW);
      drawTextCentered('BEST  ' + getBest(), 180, 14, COL_WALL, COL_WALL_GLOW);
      if (overTimer > 0.4) {
        for (const b of overButtons) drawButton(b);
      }
    }

    ctx.restore();

    // on-canvas detected-beat indicator — only when the debug panel is open
    if (document.getElementById('debug').classList.contains('show')) {
      const since = time - lastDetectedT;
      const k = lastDetectedT > 0 ? Math.max(0, 1 - since / 0.15) : 0;
      ctx.fillStyle = `rgba(255,255,255,${0.18 + k * 0.82})`;
      if (k > 0) { ctx.shadowColor = '#ff0095'; ctx.shadowBlur = 18 * k; }
      ctx.fillRect(12, H - 22, 14, 14);
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.font = '10px ui-monospace, Menlo, Consolas, monospace';
      ctx.textAlign = 'left';
      ctx.fillText('DETECTED', 32, H - 11);
    }
  }

  // ---- debug panel wiring ----------------------------------------------
  // The panel itself is always wired up; visibility is toggled via the
  // help (?) button on the main menu, or auto-shown via ?debug URL param.
  const debugMode = true;
  if (debugMode) {
    const $ = (id) => document.getElementById(id);
    const debugPanel = $('debug');
    const helpBtn = $('help-toggle');
    // panel always starts closed; user opens it via the ? button
    helpBtn.addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      e.preventDefault();
      debugPanel.classList.toggle('show');
    });
    $('d-close').addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      e.preventDefault();
      debugPanel.classList.remove('show');
    });
    // hide the help icon outside the main menu so it doesn't clutter gameplay
    let helpVisible = null;
    setInterval(() => {
      const want = state === STATE_READY;
      if (want !== helpVisible) {
        helpVisible = want;
        helpBtn.hidden = !want;
      }
    }, 100);
    const sliders = [
      ['d-thresh',   beatThresh,         (v) => beatThresh = v],
      ['d-floor',    beatFloor,          (v) => beatFloor = v],
      ['d-binstart', beatBinStart,       (v) => beatBinStart = v|0],
      ['d-binend',   beatBinEnd,         (v) => beatBinEnd = v|0],
      ['d-refract',  beatRefract * 1000, (v) => beatRefract = v / 1000],
    ];
    for (const [id, init, fn] of sliders) {
      const el = $(id);
      el.value = init;
      const v = $(id + '-v');
      v.textContent = el.value;
      el.addEventListener('input', () => {
        fn(+el.value);
        v.textContent = el.value;
        // when changing band/threshold, drop the rolling history so the
        // new params take effect immediately rather than averaging in
        if (id === 'd-binstart' || id === 'd-binend') bassHist.length = 0;
      });
    }
    let lastFlashedCount = 0;
    const flashEl = $('d-flash');
    setInterval(() => {
      $('d-status').textContent = audioStatus;
      $('d-bpm').textContent = beatBPMavg > 0 ? (60 / beatBPMavg).toFixed(0) : '—';
      $('d-energy').textContent = lastEnergy.toFixed(1);
      $('d-avg').textContent = lastAvg.toFixed(1);
      $('d-ratio').textContent = lastAvg > 0 ? (lastEnergy / lastAvg).toFixed(2) : '—';
      $('d-beats').textContent = `${detectedCount} / ${safetyCount}`;
      // restart the flash animation each time the detected counter ticks
      if (detectedCount !== lastFlashedCount) {
        flashEl.classList.remove('hit');
        // force reflow so the animation re-runs even on rapid fire
        void flashEl.offsetWidth;
        flashEl.classList.add('hit');
        lastFlashedCount = detectedCount;
      }
    }, 50);

    $('d-reset').addEventListener('click', () => {
      bassHist.length = 0;
      detectedCount = 0;
      safetyCount = 0;
      beatCount = 0;
      lastBeatT = -1;
      lastDetectedT = -1;
      beatPulse = 0;
      beatBPMavg = 0.5;
      lastEnergy = 0;
      lastAvg = 0;
      _prevSpectrumValid = false;
    });
  } else {
    // expose nothing — production users see no panel
  }
})();
</script>
</body>
</html>
