<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0a0612" />
<title>Maverick</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0612;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
    touch-action: none;
  }
  #wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    background: #0a0612;
    box-shadow: 0 0 60px rgba(255, 0, 149, 0.25), 0 0 120px rgba(0, 212, 255, 0.15);
    touch-action: none;
  }
  #rotate-prompt {
    display: none;
    position: fixed;
    inset: 0;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0612;
    color: #fff;
    text-align: center;
    padding: 24px;
  }
  #rotate-prompt .phone {
    width: 56px;
    height: 100px;
    border: 4px solid #ff0095;
    border-radius: 10px;
    position: relative;
    margin-bottom: 28px;
    box-shadow: 0 0 22px rgba(255, 0, 149, 0.6);
    animation: rotate-phone 2.4s cubic-bezier(.7,0,.3,1) infinite;
  }
  #rotate-prompt .phone::before {
    content: '';
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 22px;
    height: 4px;
    background: #ff0095;
    border-radius: 2px;
    box-shadow: 0 0 8px #ff5cb8;
  }
  #rotate-prompt h1 {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 3px;
    color: #ff0095;
    text-shadow: 0 0 14px #ff5cb8;
    margin: 0 0 8px;
  }
  #rotate-prompt p {
    font-size: 13px;
    letter-spacing: 1.5px;
    color: #00d4ff;
    text-shadow: 0 0 10px #7df0ff;
    margin: 0;
  }
  @keyframes rotate-phone {
    0%, 30%   { transform: rotate(0deg); }
    50%, 80%  { transform: rotate(-90deg); }
    100%      { transform: rotate(-90deg); }
  }
  @media (orientation: portrait) {
    #wrap { display: none; }
    #rotate-prompt { display: flex; }
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>
<div id="rotate-prompt">
  <div class="phone"></div>
  <h1>ROTATE YOUR DEVICE</h1>
  <p>MAVERICK IS A LANDSCAPE GAME</p>
</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const W = 640;
  const H = 360;

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const aspect = W / H;
    let cw = window.innerWidth;
    let ch = window.innerHeight;
    if (cw / ch > aspect) cw = ch * aspect;
    else ch = cw / aspect;
    canvas.style.width = cw + 'px';
    canvas.style.height = ch + 'px';
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  const STATE_READY = 0, STATE_PLAY = 1, STATE_OVER = 2;
  let state = STATE_READY;

  // Tuning — Maverick Bird-style, landscape
  const GRAVITY = 750;
  const FLAP_VEL = -290;
  const SCROLL_SPEED = 420;
  const WALL_INTERVAL = 1.3;
  const WALL_THICK = 26;
  const GAP_SIZE = 105;
  const PLAYER_X = 150;
  const PLAYER_SIZE = 13;
  const TRAIL_MAX = 32;

  const COL_BG = '#0a0612';
  const COL_PLAYER = '#ff0095';
  const COL_PLAYER_GLOW = '#ff5cb8';
  const COL_WALL = '#00d4ff';
  const COL_WALL_GLOW = '#7df0ff';
  const COL_LINE = '#2a1640';
  const COL_HUD = '#ffffff';

  let player, walls, score, best, spawnTimer, time, scrollOffset;
  let trail;
  let shake;
  let flashAlpha;
  let overTimer;

  // ---- audio + beat sync ------------------------------------------------
  // Drop a song.mp3 next to index.html and the game world locks to its
  // beat. With no file, falls back to a steady 120 BPM pulse.
  const AUDIO_FILE = './song.mp3';
  let audioCtx = null;
  let audioSource = null;
  let analyser = null;
  let audioStatus = 'idle'; // idle | loading | playing | failed | fallback
  const bassHist = [];
  const _freqBuf = new Uint8Array(256);
  let lastBeatT = -1;
  let beatPulse = 0;     // 0..1, decays each frame
  let beatCount = 0;
  let beatBPMavg = 0.5;  // average inter-beat interval (s)

  async function startAudio() {
    if (audioStatus !== 'idle') return;
    audioStatus = 'loading';
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      audioCtx = new Ctx();
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      const res = await fetch(AUDIO_FILE);
      if (!res.ok) throw new Error('no song');
      const arr = await res.arrayBuffer();
      const buf = await audioCtx.decodeAudioData(arr);
      audioSource = audioCtx.createBufferSource();
      audioSource.buffer = buf;
      audioSource.loop = true;
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 512;
      analyser.smoothingTimeConstant = 0.55;
      audioSource.connect(analyser);
      analyser.connect(audioCtx.destination);
      audioSource.start();
      audioStatus = 'playing';
    } catch (e) {
      audioStatus = 'fallback';
    }
  }

  function tickBeat(now, dt) {
    beatPulse = Math.max(0, beatPulse - dt * 5);
    if (analyser) {
      analyser.getByteFrequencyData(_freqBuf);
      // bass band: lowest 5 bins (~0–215 Hz @ fftSize 512, sr 44.1k)
      let energy = 0;
      for (let i = 1; i < 6; i++) energy += _freqBuf[i];
      energy /= 5;
      bassHist.push(energy);
      if (bassHist.length > 50) bassHist.shift();
      let avg = 0;
      for (const v of bassHist) avg += v;
      avg /= bassHist.length;
      const ready = bassHist.length > 20;
      if (ready && energy > avg * 1.45 && energy > 35 && now - lastBeatT > 0.18) {
        triggerBeat(now);
      }
    } else if (audioStatus === 'fallback' || audioStatus === 'idle') {
      // 120 BPM fallback so the world still throbs without audio
      const period = 0.5;
      if (now - lastBeatT > period) triggerBeat(now);
    }
  }

  function triggerBeat(now) {
    if (lastBeatT > 0) {
      const dt = now - lastBeatT;
      if (dt > 0.2 && dt < 1.2) beatBPMavg = beatBPMavg * 0.85 + dt * 0.15;
    }
    beatPulse = 1;
    beatCount++;
    lastBeatT = now;
  }

  function beatEase() {
    // sharp attack, smooth decay
    return beatPulse * beatPulse;
  }

  best = parseInt(localStorage.getItem('maverick_best') || '0', 10) || 0;

  function reset() {
    player = { x: PLAYER_X, y: H * 0.5, vy: 0, rot: 0, flapTimer: 0 };
    walls = [];
    score = 0;
    spawnTimer = 0;
    time = 0;
    scrollOffset = 0;
    trail = [];
    shake = 0;
    flashAlpha = 0;
    overTimer = 0;
    state = STATE_READY;
  }
  reset();

  function spawnWall() {
    const margin = 30;
    const minTop = margin;
    const maxTop = H - GAP_SIZE - margin;
    const top = Math.random() * (maxTop - minTop) + minTop;
    walls.push({ x: W + 10, top, passed: false });
  }

  function flap() {
    if (state === STATE_READY) {
      state = STATE_PLAY;
      startAudio();
    }
    if (state === STATE_PLAY) {
      player.vy = FLAP_VEL;
      player.flapTimer = 0.15;
    } else if (state === STATE_OVER) {
      if (overTimer > 0.6) reset();
    }
  }

  function onTap(e) {
    if (e.cancelable) e.preventDefault();
    flap();
  }
  canvas.addEventListener('pointerdown', onTap, { passive: false });
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
      e.preventDefault();
      flap();
    }
  });
  document.addEventListener('gesturestart', (e) => e.preventDefault());
  document.addEventListener('dblclick', (e) => e.preventDefault());

  // Draw helpers ----------------------------------------------------------
  function drawBackground() {
    const bp = beatEase();

    ctx.fillStyle = COL_BG;
    ctx.fillRect(0, 0, W, H);

    // beat-driven magenta wash
    if (bp > 0) {
      ctx.fillStyle = `rgba(255, 0, 149, ${bp * 0.07})`;
      ctx.fillRect(0, 0, W, H);
    }

    // perspective grid — lines pulse brighter on beat, switch to neon on beat
    ctx.strokeStyle = bp > 0.4 ? COL_PLAYER : COL_LINE;
    ctx.lineWidth = 1;
    const horizonY = H / 2;
    const linesAhead = 14;
    for (let i = 0; i < linesAhead; i++) {
      const t = ((i / linesAhead) + (scrollOffset * 0.0006) % (1 / linesAhead)) % 1;
      const eased = t * t;
      const yTop = horizonY - eased * horizonY;
      const yBot = horizonY + eased * (H - horizonY);
      ctx.globalAlpha = (0.25 + eased * 0.5) * (1 + bp * 0.9);
      ctx.beginPath();
      ctx.moveTo(0, yTop);
      ctx.lineTo(W, yTop);
      ctx.moveTo(0, yBot);
      ctx.lineTo(W, yBot);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // vertical scrolling rails — pulse to cyan on beat
    ctx.strokeStyle = bp > 0.4 ? COL_WALL : COL_LINE;
    const railSpacing = 60;
    const off = scrollOffset % railSpacing;
    for (let x = -off; x < W; x += railSpacing) {
      ctx.globalAlpha = 0.35 * (1 + bp * 1.3);
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function drawSpikeRow(x, y, width, height, dir) {
    // dir = +1 spikes pointing down (mounted on top wall)
    //       -1 spikes pointing up (mounted on bottom wall)
    const tooth = 10;
    const count = Math.max(2, Math.floor(width / tooth));
    const w = width / count;
    ctx.beginPath();
    for (let i = 0; i < count; i++) {
      const sx = x + i * w;
      ctx.moveTo(sx, y);
      ctx.lineTo(sx + w, y);
      ctx.lineTo(sx + w / 2, y + height * dir);
      ctx.closePath();
    }
    ctx.fill();
  }

  function drawWall(p) {
    const bp = beatEase();
    const gapBottom = p.top + GAP_SIZE;
    const topH = p.top;
    const botY = gapBottom;
    const botH = H - gapBottom;

    // glow
    ctx.shadowColor = COL_WALL_GLOW;
    ctx.shadowBlur = 14 + bp * 18;

    // bars
    ctx.fillStyle = COL_WALL;
    ctx.fillRect(p.x, 0, WALL_THICK, topH);
    ctx.fillRect(p.x, botY, WALL_THICK, botH);

    // bright edge
    ctx.shadowBlur = 0;
    ctx.fillStyle = COL_WALL_GLOW;
    const edgeW = 3 + bp * 4;
    ctx.fillRect(p.x + WALL_THICK - edgeW, 0, edgeW, topH);
    ctx.fillRect(p.x + WALL_THICK - edgeW, botY, edgeW, botH);

    // spike tips at gap edges
    ctx.shadowColor = COL_WALL_GLOW;
    ctx.shadowBlur = 12 + bp * 14;
    ctx.fillStyle = COL_WALL;
    drawSpikeRow(p.x, p.top, WALL_THICK, 14, +1);
    drawSpikeRow(p.x, gapBottom, WALL_THICK, 14, -1);
    ctx.shadowBlur = 0;
  }

  function drawTrail() {
    for (let i = 0; i < trail.length; i++) {
      const t = trail[i];
      const k = i / trail.length;
      ctx.globalAlpha = k * 0.5;
      ctx.fillStyle = COL_PLAYER_GLOW;
      ctx.beginPath();
      ctx.arc(t.x, t.y, PLAYER_SIZE * (0.3 + 0.7 * k), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawPlayer() {
    const bp = beatEase();
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.rot);
    const scale = 1 + bp * 0.18;
    ctx.scale(scale, scale);

    // glow
    ctx.shadowColor = COL_PLAYER_GLOW;
    ctx.shadowBlur = 22 + bp * 18;

    // triangular ship pointing right
    const s = PLAYER_SIZE;
    ctx.fillStyle = COL_PLAYER;
    ctx.beginPath();
    ctx.moveTo(s * 1.2, 0);
    ctx.lineTo(-s * 0.9, -s);
    ctx.lineTo(-s * 0.4, 0);
    ctx.lineTo(-s * 0.9, s);
    ctx.closePath();
    ctx.fill();

    // bright core
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.moveTo(s * 0.55, 0);
    ctx.lineTo(-s * 0.2, -s * 0.4);
    ctx.lineTo(-s * 0.05, 0);
    ctx.lineTo(-s * 0.2, s * 0.4);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function drawBoundaries() {
    const bp = beatEase();
    ctx.shadowColor = COL_PLAYER_GLOW;
    ctx.shadowBlur = 12 + bp * 18;
    ctx.fillStyle = COL_PLAYER;
    const t = 3 + bp * 4;
    ctx.fillRect(0, 0, W, t);
    ctx.fillRect(0, H - t, W, t);
    ctx.shadowBlur = 0;
  }

  function drawTextCentered(text, y, size, color, glow) {
    ctx.font = `900 ${size}px "Helvetica Neue", Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (glow) {
      ctx.shadowColor = glow;
      ctx.shadowBlur = 18;
    }
    ctx.fillStyle = color;
    ctx.fillText(text, W / 2, y);
    ctx.shadowBlur = 0;
  }

  // Loop ------------------------------------------------------------------
  let lastT = performance.now();
  function loop(now) {
    const dt = Math.min(0.033, (now - lastT) / 1000);
    lastT = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  function update(dt) {
    time += dt;
    if (shake > 0) shake = Math.max(0, shake - dt * 3);
    tickBeat(time, dt);

    if (state === STATE_READY) {
      player.y = H * 0.5 + Math.sin(time * 5) * 8;
      player.rot = Math.sin(time * 3) * 0.15;
      scrollOffset += SCROLL_SPEED * 0.4 * dt;
      pushTrail(SCROLL_SPEED * 0.4 * dt);
      return;
    }

    if (state === STATE_PLAY) {
      player.vy += GRAVITY * dt;
      player.y += player.vy * dt;
      player.flapTimer = Math.max(0, player.flapTimer - dt);

      const targetRot = Math.max(-0.7, Math.min(1.1, player.vy / 700));
      player.rot += (targetRot - player.rot) * Math.min(1, dt * 10);

      spawnTimer += dt;
      if (spawnTimer >= WALL_INTERVAL) {
        spawnTimer = 0;
        spawnWall();
      }

      for (const w of walls) w.x -= SCROLL_SPEED * dt;
      while (walls.length && walls[0].x + WALL_THICK < -10) walls.shift();

      for (const w of walls) {
        if (!w.passed && w.x + WALL_THICK < player.x - PLAYER_SIZE) {
          w.passed = true;
          score++;
        }
        const inX = player.x + PLAYER_SIZE > w.x && player.x - PLAYER_SIZE < w.x + WALL_THICK;
        if (inX) {
          if (player.y - PLAYER_SIZE < w.top || player.y + PLAYER_SIZE > w.top + GAP_SIZE) {
            die();
          }
        }
      }

      // ceiling / floor are lethal
      if (player.y - PLAYER_SIZE < 4 || player.y + PLAYER_SIZE > H - 4) {
        player.y = Math.max(PLAYER_SIZE + 4, Math.min(H - PLAYER_SIZE - 4, player.y));
        die();
      }

      scrollOffset += SCROLL_SPEED * dt;
      pushTrail(SCROLL_SPEED * dt);
    }

    if (state === STATE_OVER) {
      overTimer += dt;
      flashAlpha = Math.max(0, flashAlpha - dt * 2);
    }
  }

  function pushTrail(scrollDx) {
    // existing points drift left at the scroll speed so the trail
    // appears to come out of the bird's tail rather than stacking up
    for (const t of trail) t.x -= scrollDx;
    trail.push({ x: player.x - PLAYER_SIZE * 0.6, y: player.y });
    if (trail.length > TRAIL_MAX) trail.shift();
  }

  function die() {
    if (state !== STATE_PLAY) return;
    state = STATE_OVER;
    overTimer = 0;
    flashAlpha = 1;
    shake = 1;
    if (score > best) {
      best = score;
      localStorage.setItem('maverick_best', String(best));
    }
  }

  function render() {
    ctx.save();
    const bp = beatEase();

    // camera zoom punch on beat
    if (bp > 0) {
      const z = 1 + bp * 0.025;
      ctx.translate(W * 0.5, H * 0.5);
      ctx.scale(z, z);
      ctx.translate(-W * 0.5, -H * 0.5);
    }

    if (shake > 0) {
      const mag = shake * 10;
      ctx.translate((Math.random() - 0.5) * mag, (Math.random() - 0.5) * mag);
    }

    drawBackground();
    for (const w of walls) drawWall(w);
    drawBoundaries();
    drawTrail();
    drawPlayer();

    if (state === STATE_PLAY) {
      const sz = 36 + bp * 16;
      drawTextCentered(String(score), 38, sz, COL_HUD, COL_PLAYER_GLOW);
    }

    if (state === STATE_READY) {
      drawTextCentered('MAVERICK', H * 0.32, 40 + bp * 6, COL_PLAYER, COL_PLAYER_GLOW);
      drawTextCentered('TAP TO FLAP', H * 0.58, 16, COL_WALL, COL_WALL_GLOW);
      const pulse = 0.55 + Math.sin(time * 5) * 0.45;
      ctx.globalAlpha = pulse;
      drawTextCentered('TAP TO START', H * 0.74, 14, COL_HUD, null);
      ctx.globalAlpha = 1;

      // tiny audio status hint
      const hint = audioStatus === 'playing' ? '♪ SYNCED'
                 : audioStatus === 'loading' ? '♪ LOADING'
                 : audioStatus === 'fallback' ? 'NO AUDIO — 120 BPM'
                 : '♪ AUDIO ON TAP';
      ctx.globalAlpha = 0.6;
      drawTextCentered(hint, H * 0.92, 10, COL_WALL_GLOW, null);
      ctx.globalAlpha = 1;
    }

    if (state === STATE_OVER) {
      if (flashAlpha > 0) {
        ctx.fillStyle = `rgba(255, 0, 149, ${flashAlpha * 0.6})`;
        ctx.fillRect(0, 0, W, H);
      }
      drawTextCentered('CRASHED', H * 0.28, 32, COL_PLAYER, COL_PLAYER_GLOW);
      drawTextCentered(String(score), H * 0.50, 48, COL_HUD, COL_WALL_GLOW);
      drawTextCentered('BEST  ' + best, H * 0.68, 16, COL_WALL, COL_WALL_GLOW);
      if (overTimer > 0.6) {
        const pulse = 0.55 + Math.sin(time * 6) * 0.45;
        ctx.globalAlpha = pulse;
        drawTextCentered('TAP TO RETRY', H * 0.84, 14, COL_HUD, null);
        ctx.globalAlpha = 1;
      }
    }

    ctx.restore();
  }
})();
</script>
</body>
</html>
